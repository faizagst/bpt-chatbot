# /etc/nginx/sites-available/bpt-chatbot
#
# CARA PAKAI:
# 1. Upload file ini ke VPS: /etc/nginx/sites-available/bpt-chatbot
# 2. Ganti semua <<DOMAIN_KAMU>> dan <<DOMAIN_API_KAMU>>
# 3. Jalankan: sudo certbot --nginx -d <<DOMAIN_KAMU>> -d <<DOMAIN_API_KAMU>>
# 4. sudo ln -s /etc/nginx/sites-available/bpt-chatbot /etc/nginx/sites-enabled/
# 5. sudo nginx -t && sudo systemctl reload nginx

# ── REDIRECT HTTP → HTTPS ─────────────────────────────────────────

server {
    listen 80;
    server_name <<DOMAIN_KAMU>> www.<<DOMAIN_KAMU>>;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name <<DOMAIN_API_KAMU>>;
    return 301 https://$host$request_uri;
}

# ── FRONTEND (Next.js) ────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name <<DOMAIN_KAMU>> www.<<DOMAIN_KAMU>>;

    # SSL (diisi otomatis oleh certbot)
    ssl_certificate /etc/letsencrypt/live/<<DOMAIN_KAMU>>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<<DOMAIN_KAMU>>/privkey.pem;

    # Proxy ke Next.js container
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

# ── BACKEND API (FastAPI) ─────────────────────────────────────────

server {
    listen 443 ssl;
    server_name <<DOMAIN_API_KAMU>>;

    # SSL (diisi otomatis oleh certbot)
    ssl_certificate /etc/letsencrypt/live/<<DOMAIN_API_KAMU>>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<<DOMAIN_API_KAMU>>/privkey.pem;

    # Besarkan limit upload untuk file dokumen (PDF, DOCX, dll)
    client_max_body_size 50M;

    # Proxy ke FastAPI container
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
